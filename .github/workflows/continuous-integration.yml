name: Continuous Integration

on:
  push:
    branches: [ dev ]

jobs:
  build:

    runs-on: self-hosted
    
    defaults:
      run:
        working-directory: /var/www/html/dev.todayscrypto.com
          
    steps:
      - name: PWD
        run: pwd
      
      - name: Pull
        run: git pull
      
      - name: composer install
        run: composer install
    
      - name: Migrate
        run: php artisan migrate --force
        
      - name: Clear cache
        run: php artisan cache:clear
      
      - name: Execute tests
        run: vendor/bin/phpunit
